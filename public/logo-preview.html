<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e2e8f0;font-family:Arial,sans-serif;padding:40px 20px;}
h1{text-align:center;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:#64748b;margin-bottom:36px;}
