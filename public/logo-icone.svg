<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a6342"/>
      <stop offset="100%" stop-color="#042c1d"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd633"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="goldH2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffc800"/>
      <stop offset="100%" stop-color="#ff7a2a"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#042c1d" flood-opacity="0.5"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond rond -->
  <circle cx="100" cy="100" r="96" fill="url(#bg2)" filter="url(#sh2)"/>
  <!-- Anneau or -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#ffc800" stroke-width="1.5" opacity="0.35"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ffc800" stroke-width="0.7" opacity="0.15"/>

  <!-- Étoile islamique déco -->
  <g opacity="0.07" transform="translate(100,100)">
    <polygon points="0,-55 11,-20 48,-20 19,8 30,43 0,26 -30,43 -19,8 -48,-20 -11,-20" fill="#ffc800"/>
  </g>

  <!-- Sol / base boutique -->
  <rect x="32" y="128" width="136" height="34" rx="7" fill="url(#gold2)" filter="url(#glow2)"/>

  <!-- Corps boutique -->
  <rect x="38" y="92" width="124" height="40" rx="5" fill="#0e7d52"/>
  <rect x="38" y="92" width="124" height="5" rx="2" fill="url(#gold2)"/>

  <!-- Auvent -->
  <path d="M24 92 Q100 48 176 92 Z" fill="url(#gold2)"/>
  <!-- Stripes auvent -->
  <line x1="46" y1="91" x2="36" y2="92" stroke="#042c1d" stroke-width="3" opacity="0.25"/>
  <line x1="67" y1="73" x2="56" y2="92" stroke="#042c1d" stroke-width="3" opacity="0.25"/>
  <line x1="100" y1="62" x2="100" y2="92" stroke="#042c1d" stroke-width="3" opacity="0.25"/>
  <line x1="133" y1="73" x2="144" y2="92" stroke="#042c1d" stroke-width="3" opacity="0.25"/>
  <line x1="154" y1="91" x2="164" y2="92" stroke="#042c1d" stroke-width="3" opacity="0.25"/>

  <!-- Porte arc -->
  <path d="M82 132 L82 108 Q100 94 118 108 L118 132 Z" fill="#042c1d"/>
  <path d="M85 132 L85 110 Q100 98 115 110 L115 132 Z" fill="#07402b"/>

  <!-- Fenêtres -->
  <rect x="45" y="99" width="26" height="22" rx="3" fill="url(#gold2)" opacity="0.85"/>
  <line x1="58" y1="99" x2="58" y2="121" stroke="#042c1d" stroke-width="1.5" opacity="0.4"/>
  <rect x="129" y="99" width="26" height="22" rx="3" fill="url(#gold2)" opacity="0.85"/>
  <line x1="142" y1="99" x2="142" y2="121" stroke="#042c1d" stroke-width="1.5" opacity="0.4"/>

  <!-- Croissant + étoile -->
  <path d="M88 44 C84 33 95 22 109 26 C97 27 90 36 88 44 Z" fill="url(#gold2)" filter="url(#glow2)"/>
  <polygon points="118,26 120,33 128,33 122,38 124,45 118,41 112,45 114,38 108,33 116,33"
    transform="scale(0.7) translate(52,12)" fill="url(#gold2)" filter="url(#glow2)"/>

  <!-- Point central bas -->
  <circle cx="100" cy="128" r="4" fill="#ffc800" opacity="0.9"/>

  <!-- Lettres "MO" au centre discret -->
  <text x="100" y="170"
    text-anchor="middle"
    font-family="'Arial Black', sans-serif"
    font-size="13"
    font-weight="900"
    letter-spacing="5"
    fill="#ffc800"
    opacity="0.6">OCASS</text>
</svg>
